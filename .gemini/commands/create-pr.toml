description = "Creates a GitHub PR if the current branch is not main or master."
prompt = """
Follow these steps to create a PR:

1. Check the current branch name using `git branch --show-current`.
2. IMPORTANT: If the branch is `main` or `master`, just stop and inform me.
3. Use the GitHub CLI to create the PR:
   `gh pr create --title "{{args}}" --body "Automated PR generated by Gemini CLI agent based on local changes."`
4. Output the resulting PR URL to the console.

Context of changes:
!{git diff --cached}
"""