{% extends 'layout.html' %}

{% block content %}
<div class="container">
    <h1>Welcome to the Course Explainer</h1>
    <p>This application provides an overview of various courses available.</p>
    <h2>Available Courses</h2>
    <ul>
        {% for c in courses %}
            <li><a href="{{ url_for('course', course_id=loop.index) }}">{{ c.title }}</a></li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
